# =============================================================================
# Forge — Continuous Integration
# =============================================================================
# Runs on every push and pull request to main/develop.
# Validates: lint → type check → build → Docker for both services.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend checks
  # ---------------------------------------------------------------------------
  backend:
    name: Backend — Lint, Type Check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --no-error-summary

      - name: Verify imports
        run: |
          python -c "from app.main import app; print('Backend imports verified')"

      - name: Verify health schema
        run: |
          python -c "
          from app.schemas.responses import HealthResponse
          h = HealthResponse(status='healthy', application='test', version='0.1.0', build='2025-01-01', git_commit='abc12345', python_version='3.11.0', supported_models=['test/model'], environment='ci', uptime=1.0, timestamp='2025-01-01T00:00:00Z')
          print('Health schema validated')
          "

  # ---------------------------------------------------------------------------
  # Frontend checks
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend — Lint, Type Check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker build verification
  # ---------------------------------------------------------------------------
  docker:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
